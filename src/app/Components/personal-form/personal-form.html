<div class="section-form">
  <div class="section-intro">
    <span class="section-icon">👤</span>
    <div>
      <strong>Personal Information</strong>
      <span>Your contact details and introduction</span>
    </div>
  </div>

  <!-- ── PHOTO UPLOAD ── -->
  <div class="photo-section">
    <div class="photo-label">
      Profile Photo
      <span class="optional">(optional · Modern template only)</span>
    </div>

    <div class="photo-upload-area">
      <!-- Preview -->
      <div class="photo-preview" *ngIf="resumeData.personalInfo.photo">
        <img [src]="resumeData.personalInfo.photo" alt="Profile photo" />
        <button class="remove-photo-btn" (click)="removePhoto()" title="Remove photo">✕</button>
      </div>

      <!-- Upload placeholder -->
      <label class="photo-placeholder" *ngIf="!resumeData.personalInfo.photo">
        <input type="file" accept="image/*" (change)="onPhotoSelected($event)" hidden />
        <span class="upload-icon">📷</span>
        <span class="upload-text">Click to upload</span>
        <span class="upload-hint">JPG, PNG · Max 2MB</span>
      </label>

      <!-- Change button when photo exists -->
      <label class="change-photo-btn" *ngIf="resumeData.personalInfo.photo">
        <input type="file" accept="image/*" (change)="onPhotoSelected($event)" hidden />
        📷 Change Photo
      </label>
    </div>
  </div>

  <div class="form-divider"></div>

  <!-- ── PERSONAL DETAILS ── -->
  <div class="form-group">
    <label>Full Name <span class="required">*</span></label>
    <input type="text" placeholder="e.g. Albin Sebana Kurian"
      [(ngModel)]="resumeData.personalInfo.fullName" (ngModelChange)="emit()" />
  </div>

  <div class="form-group">
    <label>Job Title</label>
    <input type="text" placeholder="e.g. Frontend Developer"
      [(ngModel)]="resumeData.personalInfo.jobTitle" (ngModelChange)="emit()" />
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Email <span class="required">*</span></label>
      <input type="email" placeholder="you@example.com"
        [(ngModel)]="resumeData.personalInfo.email" (ngModelChange)="emit()" />
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="tel" placeholder="+91 98765 43210"
        [(ngModel)]="resumeData.personalInfo.phone" (ngModelChange)="emit()" />
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Location</label>
      <input type="text" placeholder="Kochi, Kerala"
        [(ngModel)]="resumeData.personalInfo.location" (ngModelChange)="emit()" />
    </div>
    <div class="form-group">
      <label>LinkedIn / Website</label>
      <input type="url" placeholder="linkedin.com/in/..."
        [(ngModel)]="resumeData.personalInfo.website" (ngModelChange)="emit()" />
    </div>
  </div>

  <div class="form-group">
    <label>Professional Summary</label>
    <textarea rows="5"
      placeholder="Brief 2–3 sentence summary of your experience and strengths..."
      [(ngModel)]="resumeData.personalInfo.summary" (ngModelChange)="emit()"></textarea>
  </div>
</div>
