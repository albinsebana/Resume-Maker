<div class="toolbar-actions">

  <!-- PRINT BUTTON -->
  <button class="action-btn print-btn" (click)="onPrint()" [disabled]="isLoading">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
      <polyline points="6 9 6 2 18 2 18 9"/>
      <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
      <rect x="6" y="14" width="12" height="8"/>
    </svg>
    Print
  </button>

  <!-- DOWNLOAD DROPDOWN -->
  <div class="dropdown-wrap">
    <button class="action-btn download-btn" (click)="toggleDropdown()" [disabled]="isLoading">
      <span *ngIf="!isLoading">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11"
          [style.transform]="showDropdown ? 'rotate(180deg)' : 'rotate(0)'">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </span>
      <span *ngIf="isLoading" class="loading-text">
        <span class="spinner"></span>{{ loadingLabel }}
      </span>
    </button>

    <!-- DROPDOWN MENU -->
    <div class="dropdown-menu" *ngIf="showDropdown">
      <div class="dropdown-header">Choose format</div>

      <button class="dropdown-item" (click)="onDownload('pdf')">
        <div class="item-icon pdf-icon">PDF</div>
        <div class="item-info">
          <span class="item-label">Save as PDF</span>
          <span class="item-desc">Print-ready, best quality</span>
        </div>
      </button>

      <button class="dropdown-item" (click)="onDownload('html')">
        <div class="item-icon html-icon">HTML</div>
        <div class="item-info">
          <span class="item-label">HTML File</span>
          <span class="item-desc">Open in any browser</span>
        </div>
      </button>

      <button class="dropdown-item" (click)="onDownload('doc')">
        <div class="item-icon doc-icon">DOC</div>
        <div class="item-info">
          <span class="item-label">Word Document</span>
          <span class="item-desc">Editable in MS Word</span>
        </div>
      </button>

      <button class="dropdown-item" (click)="onDownload('image')">
        <div class="item-icon img-icon">PNG</div>
        <div class="item-info">
          <span class="item-label">Image (PNG)</span>
          <span class="item-desc">Share as a picture</span>
        </div>
      </button>
    </div>
  </div>

</div>
