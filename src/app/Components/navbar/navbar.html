<!-- ── HAMBURGER BUTTON (always visible) ── -->
<button class="hamburger-btn" (click)="toggleNav()" [class.open]="navOpen" aria-label="Menu">
  <span class="bar bar-1"></span>
  <span class="bar bar-2"></span>
  <span class="bar bar-3"></span>
</button>

<!-- ── BACKDROP ── -->
<div class="nav-backdrop" [class.open]="navOpen" (click)="closeNav()"></div>

<!-- ── SIDE NAV PANEL ── -->
<nav class="sidenav" [class.open]="navOpen">

  <!-- Nav Header -->
  <div class="nav-header">
    <div class="nav-logo">
      <span class="nav-logo-icon">✦</span>
      <span class="nav-logo-text">Resume Maker</span>
    </div>
    <button class="nav-close-btn" (click)="closeNav()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Nav Links -->
  <div class="nav-links">

    <a class="nav-item" routerLink="/home" routerLinkActive="active"
      (click)="closeNav()">
      <span class="nav-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </span>
      <span class="nav-item-label">Home</span>
    </a>

    <a class="nav-item" routerLink="/resume-builder" routerLinkActive="active"
      (click)="closeNav()">
      <span class="nav-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
      </span>
      <span class="nav-item-label">Builder</span>
    </a>

    <a class="nav-item" routerLink="/about" routerLinkActive="active"
      (click)="closeNav()">
      <span class="nav-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </span>
      <span class="nav-item-label">About</span>
    </a>

    <a class="nav-item" routerLink="/settings" routerLinkActive="active"
      (click)="closeNav()">
      <span class="nav-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </span>
      <span class="nav-item-label">Settings</span>
    </a>

  </div>

  <!-- Logout at bottom -->
  <div class="nav-footer">
    <button class="nav-item logout-item" (click)="logout()">
      <span class="nav-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </span>
      <span class="nav-item-label">Logout</span>
    </button>
  </div>

</nav>
