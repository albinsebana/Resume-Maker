<div class="builder-wrapper">

  <!-- ═══════ LEFT PANEL ═══════ -->
  <div class="form-panel">

    <div class="form-header">
      <div class="header-top">
        <div>
          <h2>Resume Builder</h2>
          <p>Live preview updates as you type</p>
        </div>
        <div class="header-actions">
          <span class="save-indicator"
            [class.saving]="saveStatus === 'saving'"
            [class.saved]="saveStatus === 'saved'">
            <span *ngIf="saveStatus === 'saving'">⟳ Saving…</span>
            <span *ngIf="saveStatus === 'saved'">✓ Saved</span>
          </span>
          <button class="clear-btn" (click)="clearAll()">🗑 Reset</button>
        </div>
      </div>
    </div>

    <!-- Section Tabs -->
    <div class="section-tabs">
      <button *ngFor="let s of sections"
        class="tab-btn"
        [class.active]="activeSection === s.id"
        (click)="setSection(s.id)">
        {{ s.label }}
      </button>
    </div>

    <!-- Section Components -->
    <div class="form-body">
      <app-personal-form
        *ngIf="activeSection === 'personal'"
        [resumeData]="resumeData"
        (dataChange)="onDataChange($event)">
      </app-personal-form>

      <app-experience-form
        *ngIf="activeSection === 'experience'"
        [resumeData]="resumeData"
        (dataChange)="onDataChange($event)">
      </app-experience-form>

      <app-education-form
        *ngIf="activeSection === 'education'"
        [resumeData]="resumeData"
        (dataChange)="onDataChange($event)">
      </app-education-form>

      <app-skills-form
        *ngIf="activeSection === 'skills'"
        [resumeData]="resumeData"
        (dataChange)="onDataChange($event)">
      </app-skills-form>

      <app-projects-form
        *ngIf="activeSection === 'projects'"
        [resumeData]="resumeData"
        (dataChange)="onDataChange($event)">
      </app-projects-form>

      <app-languages-form
        *ngIf="activeSection === 'languages'"
        [resumeData]="resumeData"
        (dataChange)="onDataChange($event)">
      </app-languages-form>

      <app-softskills-form
        *ngIf="activeSection === 'softskills'"
        [resumeData]="resumeData"
        (dataChange)="onDataChange($event)">
      </app-softskills-form>

      <app-style-config
        *ngIf="activeSection === 'style'"
        [resumeData]="resumeData"
        (dataChange)="onDataChange($event)">
      </app-style-config>
    </div>

  </div><!-- /form-panel -->


  <!-- ═══════ RIGHT PANEL ═══════ -->
  <div class="preview-panel">

    <div class="preview-toolbar">
      <div class="toolbar-left">
        <span class="preview-label">Preview</span>
        <div class="template-switcher">
          <button *ngFor="let t of templates"
            class="tpl-btn"
            [class.active]="activeTemplate === t.id"
            (click)="setTemplate(t.id)">
            {{ t.label }}
            <small>{{ t.desc }}</small>
          </button>
        </div>
      </div>

      <!-- Download toolbar replaces the old print button -->
      <app-download-toolbar
        [resumeName]="resumeData.personalInfo.fullName || 'resume'">
      </app-download-toolbar>
    </div>

    <div class="resume-scroll">
      <app-classic-template
        *ngIf="activeTemplate === 'classic'"
        [resumeData]="resumeData">
      </app-classic-template>

      <app-modern-template
        *ngIf="activeTemplate === 'modern'"
        [resumeData]="resumeData">
      </app-modern-template>

      <app-minimal-template
        *ngIf="activeTemplate === 'minimal'"
        [resumeData]="resumeData">
      </app-minimal-template>

      <app-executive-template
        *ngIf="activeTemplate === 'executive'"
        [resumeData]="resumeData">
      </app-executive-template>

      <app-creative-template
        *ngIf="activeTemplate === 'creative'"
        [resumeData]="resumeData">
      </app-creative-template>
    </div>

  </div><!-- /preview-panel -->

</div>
